version: '3.8'

services:
  # MongoDB - Primary database
  mongodb:
    image: mongo:7.0-rc
    container_name: cortexreel-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=cortexreel
      - MONGO_INITDB_ROOT_PASSWORD=cortexreel_mongo_2024!
      - MONGO_INITDB_DATABASE=cortexreel
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - cortexreel-network
    command: mongod --auth

  # Weaviate - Vector database
  weaviate:
    image: semitechnologies/weaviate:1.21.2
    container_name: cortexreel-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=false
      - AUTHENTICATION_APIKEY_ENABLED=true
      - AUTHENTICATION_APIKEY_ALLOWED_KEYS=cortexreel-weaviate-key-2024
      - AUTHENTICATION_APIKEY_USERS=cortexreel-user
      - AUTHORIZATION_ADMINLIST_ENABLED=true
      - AUTHORIZATION_ADMINLIST_USERS=cortexreel-user
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=text2vec-openai
      - ENABLE_MODULES=text2vec-openai,text2vec-cohere,text2vec-huggingface,ref2vec-centroid,generative-openai,qna-openai
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - cortexreel-network

  # Redis - Caching and job queue
  redis:
    image: redis:7.2-alpine
    container_name: cortexreel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=cortexreel_redis_2024!
    command: redis-server --requirepass cortexreel_redis_2024!
    volumes:
      - redis_data:/data
    networks:
      - cortexreel-network

  # MinIO - Object storage
  minio:
    image: minio/minio:latest
    container_name: cortexreel-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=cortexreel
      - MINIO_ROOT_PASSWORD=cortexreel_minio_2024!
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - cortexreel-network

  # Fastify Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cortexreel-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://cortexreel:cortexreel_mongo_2024!@mongodb:27017/cortexreel?authSource=admin
      - REDIS_URL=redis://:cortexreel_redis_2024!@redis:6379
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_API_KEY=cortexreel-weaviate-key-2024
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=cortexreel
      - MINIO_SECRET_KEY=cortexreel_minio_2024!
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
    depends_on:
      - mongodb
      - redis
      - weaviate
      - minio
    networks:
      - cortexreel-network
    volumes:
      - ./uploads:/app/uploads

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cortexreel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - cortexreel-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  weaviate_data:
    driver: local
  minio_data:
    driver: local

networks:
  cortexreel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 